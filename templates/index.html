<!DOCTYPE html>
<html>
<head>
    <title>Insurance Prediction</title>
</head>
<body>

<h2>Insurance Prediction App</h2>

<form method="POST">
    Age: <input name="age" type="number" required><br><br>
    BMI: <input name="bmi" type="number" step="0.1" required><br><br>
    Children: <input name="children" type="number" required><br><br>

    Smoker:
    <select name="smoker">
        <option value="yes">yes</option>
        <option value="no">no</option>
    </select><br><br>

    <button type="submit">Predict</button>
</form>

{% if result %}
<h3>Predicted Insurance Cost: {{ result }}</h3>
{% endif %}

{% if error %}
<h3 style="color:red;">Error: {{ error }}</h3>
{% endif %}

</body>
</html>
