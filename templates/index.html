<!DOCTYPE html>
<html>
<head>
    <title>Insurance Prediction</title>
</head>
<body>

<h2>Insurance Prediction App</h2>

<form method="POST">

    Age:
    <input name="age" type="number" required><br><br>

    Sex:
    <select name="sex">
        <option value="male">male</option>
        <option value="female">female</option>
    </select><br><br>

    BMI:
    <input name="bmi" type="number" step="any" required><br><br>

    Children:
    <input name="children" type="number" required><br><br>

    Smoker:
    <select name="smoker">
        <option value="yes">yes</option>
        <option value="no">no</option>
    </select><br><br>

    Claim Amount:
    <input name="Claim_Amount" type="number" step="any" required><br><br>

    Past Consultations:
    <input name="past_consultations" type="number" required><br><br>

    Number of Steps:
    <input name="num_of_steps" type="number" required><br><br>

    Hospital Expenditure:
    <input name="Hospital_expenditure" type="number" step="any" required><br><br>

    Number of Procedures:
    <input name="Number_of_procedures" type="number" required><br><br>

    Annual Salary:
    <input name="Annual_Salary" type="number" step="any" required><br><br>

    Region:
    <select name="region">
        <option value="southeast">southeast</option>
        <option value="southwest">southwest</option>
        <option value="northeast">northeast</option>
        <option value="northwest">northwest</option>
    </select><br><br>

    <button type="submit">Predict</button>

</form>

{% if result %}
<h3>Prediction: {{ result }}</h3>
{% endif %}

{% if error %}
<h3 style="color:red;">Error: {{ error }}</h3>
{% endif %}

</body>
</html>
